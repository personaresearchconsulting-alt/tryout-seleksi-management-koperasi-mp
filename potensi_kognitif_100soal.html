<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAT Premium - Persona Research & Consulting</title>
    <style>
        :root { --primary: #001f3f; --gold: #d4af37; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--bg); color: #333; -webkit-user-select: none; user-select: none; }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom: 5px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .container { max-width: 1100px; margin: 20px auto; display: flex; gap: 20px; padding: 0 15px; }
        .main-content { flex: 3; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .sidebar { flex: 1; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 90px; height: fit-content; }
        .q-text { font-size: 1.25rem; font-weight: 600; margin-bottom: 25px; line-height: 1.6; color: #111; }
        .option { display: flex; align-items: center; padding: 15px; margin: 12px 0; border: 2px solid #eee; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-size: 1rem; }
        .option:hover { border-color: var(--primary); background: #f0f4f8; }
        .option.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; max-height: 350px; overflow-y: auto; padding-right: 5px; }
        .nav-btn { padding: 10px 5px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 0.85rem; text-align: center; border-radius: 5px; font-weight: bold; }
        .nav-btn.active { border: 2px solid var(--gold); background: #fffdf0; }
        .nav-btn.filled { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-action { padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        .btn-next { background: var(--primary); color: white; }
        .btn-prev { background: #6c757d; color: white; }
        #timer { font-size: 2rem; font-weight: bold; color: #d9534f; text-align: center; margin-bottom: 10px; font-family: monospace; }
        .login-box { max-width: 450px; margin: 80px auto; background: white; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .teach-box { background: #fffdf0; border-left: 6px solid var(--gold); padding: 20px; margin-top: 15px; border-radius: 4px; font-size: 0.95rem; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="login-screen" class="login-box">
    <div style="background: #000; color: #fff; width: 60px; height: 60px; line-height: 60px; border-radius: 12px; margin: 0 auto 20px; font-weight: bold; font-size: 24px;">PRC</div>
    <h2 style="color: var(--primary); margin-bottom: 5px;">CAT SIMULATION 2026</h2>
    <p style="color: #666; margin-bottom: 30px;">Persona Research & Consulting</p>
    <input type="text" id="userName" placeholder="Masukkan Nama Lengkap" style="width:100%; padding: 15px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px;">
    <button class="btn-action btn-next" style="width:100%" onclick="startQuiz()">MULAI UJIAN</button>
</div>

<div id="quiz-screen" style="display:none;">
    <div class="header">
        <h3 id="display-name" style="margin:0; letter-spacing: 1px;">UJIAN POTENSI KOGNITIF</h3>
    </div>
    <div class="container">
        <div class="main-content">
            <div id="q-area">
                <div class="q-text" id="q-text"></div>
                <div id="options-container"></div>
            </div>
            <div style="margin-top:40px; display:flex; justify-content:space-between; border-top: 1px solid #eee; padding-top: 25px;">
                <button class="btn-action btn-prev" onclick="changeQuestion(-1)">SEBELUMNYA</button>
                <button class="btn-action btn-next" id="next-label" onclick="changeQuestion(1)">SELANJUTNYA</button>
            </div>
        </div>
        <div class="sidebar">
            <div id="timer">90:00</div>
            <div style="text-align:center; color:#888; font-size: 0.8rem; margin-bottom: 20px;">SISA WAKTU</div>
            <hr>
            <div style="font-weight:bold; margin: 15px 0 10px; color: var(--primary);">NAVIGASI NOMOR</div>
            <div class="nav-grid" id="nav-grid"></div>
            <button class="btn-action" style="width:100%; margin-top:30px; background:#d9534f; color:white;" onclick="finishQuiz()">SELESAI & KIRIM</button>
        </div>
    </div>
</div>

<div id="result-screen" style="display:none; max-width: 900px; margin: 40px auto; padding: 20px;">
    <div class="main-content">
        <h2 style="text-align:center; color: var(--primary);">LAPORAN HASIL UJIAN</h2>
        <div id="final-score" style="font-size:5rem; text-align:center; color:var(--primary); font-weight:bold; margin: 20px 0;">0</div>
        <div style="text-align:center; margin-bottom: 40px; color: #666;">Nilai Akhir Anda</div>
        <hr>
        <h3 style="margin-top:30px;">Review & Pembahasan Soal:</h3>
        <div id="review-container"></div>
        <button class="btn-action btn-next" style="display:block; margin:40px auto;" onclick="location.reload()">KEMBALI KE BERANDA</button>
    </div>
</div>

        { q: "Mamalia laut terbesar adalah...", o: ["Hiu", "Paus Biru", "Lumba-lumba", "Anjing Laut", "Dugong"], a: 1, h: "Paus Biru." },
        { q: "Benua Hitam adalah julukan...", o: ["Asia", "Eropa", "Afrika", "Amerika", "Australia"], a: 2, h: "Afrika." },
        { q: "Matahari terbit dari sebelah...", o: ["Barat", "Timur", "Utara", "Selatan", "Tengah"], a: 1, h: "Timur." },
        { q: "KPK singkatan dari...", o: ["Komisi Pemberantasan Korupsi", "Komisi Pemilihan Kami", "Kantor Pajak Kecil", "Kumpulan Penulis Kecil", "Komisi Pemuda Kita"], a: 0, h: "Sudah jelas." },
        { q: "Pancasila terdiri dari berapa sila?", o: ["3", "4", "5", "6", "7"], a: 2, h: "Sudah jelas." },
        { q: "Alat musik angklung berasal dari...", o: ["Jawa Tengah", "Jawa Timur", "Jawa Barat", "Bali", "Papua"], a: 2, h: "Jawa Barat." },
        { q: "Simbol negara Indonesia adalah burung...", o: ["Elang", "Cendrawasih", "Garuda", "Merpati", "Kakatua"], a: 2, h: "Garuda." },
        { q: "Warna primer adalah...", o: ["Hijau Kuning", "Merah Kuning Biru", "Ungu Oranye", "Hitam Putih", "Cokelat Abu"], a: 1, h: "Sudah jelas." },
        { q: "Lautan yang sangat luas disebut...", o: ["Danau", "Sungai", "Rawa", "Samudra", "Teluk"], a: 3, h: "Sudah jelas." },
        { q: "Tari Kecak berasal dari...", o: ["Aceh", "Padang", "Bali", "Lombok", "Manado"], a: 2, h: "Bali." },
        { q: "Rumah adat Sumatera Barat adalah...", o: ["Joglo", "Gadang", "Honai", "Limas", "Panggung"], a: 1, h: "Rumah Gadang." },
        { q: "Presiden RI saat ini (2026) adalah...", o: ["Jokowi", "Prabowo Subianto", "Anies", "Ganjar", "Gibran"], a: 1, h: "Sesuai masa jabatan 2024-2029." }
    ];

    let currentIdx = 0;
    let userAnswers = {};
    let timeLeft = 5400; // 90 Menit
    let timerId;
    let quizData = [];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startQuiz() {
        const name = document.getElementById('userName').value;
        if(!name) return alert("Masukkan Nama Lengkap!");
        
        quizData = shuffle([...fullBank]);
        document.getElementById('display-name').innerText = name.toUpperCase() + " - CAT SESSION";
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        
        showQuestion();
        renderNav();
        startTimer();
    }

    function showQuestion() {
        const data = quizData[currentIdx];
        document.getElementById('q-text').innerText = `${currentIdx + 1}. ${data.q}`;
        
        let html = "";
        data.o.forEach((opt, i) => {
            const isSelected = userAnswers[currentIdx] === i ? 'selected' : '';
            html += `<div class="option ${isSelected}" onclick="selectOption(${i})">
                <b style="margin-right:15px">${String.fromCharCode(65+i)}.</b> ${opt}
            </div>`;
        });
        document.getElementById('options-container').innerHTML = html;
        document.getElementById('next-label').innerText = currentIdx === 99 ? "FINISH" : "SELANJUTNYA";
        renderNav();
    }

    function selectOption(optIdx) {
        userAnswers[currentIdx] = optIdx;
        showQuestion();
        // AUTO NEXT
        setTimeout(() => { if(currentIdx < 99) changeQuestion(1); }, 400);
    }

    function changeQuestion(dir) {
        currentIdx += dir;
        if(currentIdx < 0) currentIdx = 0;
        if(currentIdx > 99) { currentIdx = 99; return; }
        showQuestion();
    }

    function renderNav() {
        let html = "";
        for(let i=0; i<100; i++) {
            let cls = "nav-btn";
            if(i === currentIdx) cls += " active";
            if(userAnswers[i] !== undefined) cls += " filled";
            html += `<div class="${cls}" onclick="jumpTo(${i})">${i+1}</div>`;
        }
        document.getElementById('nav-grid').innerHTML = html;
    }

    function jumpTo(i) { currentIdx = i; showQuestion(); }

    function startTimer() {
        timerId = setInterval(() => {
            timeLeft--;
            let min = Math.floor(timeLeft / 60);
            let sec = timeLeft % 60;
            document.getElementById('timer').innerText = `${min < 10 ? '0' : ''}${min}:${sec < 10 ? '0' : ''}${sec}`;
            if(timeLeft <= 0) { clearInterval(timerId); finishQuiz(); }
        }, 1000);
    }

    function finishQuiz() {
        if(timeLeft > 0) {
            if(!confirm("Anda yakin ingin mengakhiri ujian sekarang?")) return;
        }
        clearInterval(timerId);
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        
        let score = 0;
        let reviewHtml = "";
        quizData.forEach((d, i) => {
            const isCorrect = userAnswers[i] === d.a;
            if(isCorrect) score++;
            reviewHtml += `
                <div style="margin-bottom:30px; border-bottom:2px solid #eee; padding-bottom:15px;">
                    <p><b>SOAL ${i+1}:</b> ${d.q}</p>
                    <p style="color:${isCorrect ? '#27ae60' : '#d9534f'}; font-weight:bold;">
                        Jawaban Anda: ${userAnswers[i] !== undefined ? String.fromCharCode(65+userAnswers[i]) : 'TIDAK DIJAWAB'} 
                        ${isCorrect ? '(BENAR)' : '(SALAH)'}
                    </p>
                    <p style="color:#2980b9"><b>Kunci Jawaban: ${String.fromCharCode(65+d.a)}</b></p>
                    <div class="teach-box"><b>Pembahasan:</b> ${d.h}</div>
                </div>
            `;
        });
        document.getElementById('final-score').innerText = score;
        document.getElementById('review-container').innerHTML = reviewHtml;
        window.scrollTo(0,0);
    }
</script>
