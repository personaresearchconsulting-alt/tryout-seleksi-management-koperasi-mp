    <style>
        :root { --primary: #1a1a2e; --accent: #c5a059; --bg: #f8f7f2; --text: #1a1a2e; --success: #27ae60; --danger: #e74c3c; --gold: #d4af37; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; margin: 0; padding: 0; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; color: var(--text); padding: 10px; line-height: 1.5; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border-top: 8px solid var(--accent); }
        .brand { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .brand h1 { font-size: 24px; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        .brand p { font-size: 14px; color: var(--gold); font-weight: bold; }
        .timer { font-size: 28px; font-weight: 800; color: var(--danger); text-align: center; margin-bottom: 20px; background: #fff5f5; padding: 10px; border-radius: 8px; border: 1px solid #ffebeb; }
        .q-text { font-size: 18px; font-weight: 600; color: var(--primary); margin-bottom: 20px; }
        .opt { display: flex; align-items: center; padding: 12px; margin: 8px 0; border: 2px solid #f0f0f0; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .opt:hover { background: #fdfaf0; border-color: var(--accent); }
        .opt.selected { background: var(--primary); color: #fff; border-color: var(--primary); }
        .nav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 5px; margin: 20px 0; padding: 10px; background: #fafafa; border-radius: 8px; max-height: 150px; overflow-y: auto; }
        .nav-item { height: 35px; display: flex; align-items: center; justify-content: center; background: #fff; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .nav-item.filled { background: var(--accent); color: #fff; border-color: var(--accent); }
        .nav-item.active { border: 2px solid var(--primary); font-weight: bold; }
        .btn { padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-navy { background: var(--primary); color: #fff; }
        .recap-container { margin-top: 30px; text-align: left; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: var(--primary); color: white; }
        .correct { color: var(--success); font-weight: bold; }
        .wrong { color: var(--danger); font-weight: bold; }
        footer { text-align: center; margin-top: 20px; font-size: 12px; color: #777; }
    </style>
</head>

    let current = 0;
    let userAns = new Array(rawData.length).fill(null);
    let timeLeft = 5400;

    function startTest() {
        if(!document.getElementById('username').value) return alert("Masukkan Nama!");
        document.getElementById('login-screen').style.display='none';
        document.getElementById('test-screen').style.display='block';
        render();
        setInterval(() => {
            if(timeLeft <= 0) confirmFinish();
            timeLeft--;
            let m = Math.floor(timeLeft/60);
            let s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`;
        }, 1000);
    }

    function render() {
        const q = rawData[current];
        document.getElementById('q-num').innerText = `SOAL NO. ${current + 1}`;
        document.getElementById('q-text').innerText = q.q;
        let h = "";
        q.o.forEach((o, i) => {
            h += `<div class="opt ${userAns[current]===i?'selected':''}" onclick="pick(${i})">${String.fromCharCode(65+i)}. ${o}</div>`;
        });
        document.getElementById('options-container').innerHTML = h;
        let n = "";
        rawData.forEach((_, i) => {
            n += `<div class="nav-item ${userAns[i]!==null?'filled':''} ${current===i?'active':''}" onclick="current=${i};render()">${i+1}</div>`;
        });
        document.getElementById('nav-grid').innerHTML = n;
    }

    function pick(i) {
        userAns[current] = i;
        render();
        // AUTO NEXT LOGIC
        if (current < rawData.length - 1) {
            setTimeout(() => { changeQ(1); }, 300); 
        }
    }

    function changeQ(d) {
        current = Math.max(0, Math.min(rawData.length-1, current+d));
        render();
    }

    function confirmFinish() {
        if(confirm("Selesaikan ujian?")) {
            let score = 0, h = "";
            rawData.forEach((q, i) => {
                let isC = userAns[i] === q.a;
                if(isC) score++;
                h += `<tr><td>${i+1}</td><td class="${isC?'correct':'wrong'}">${userAns[i]!==null?String.fromCharCode(65+userAns[i]):'-'}</td><td>${String.fromCharCode(65+q.a)}</td><td class="${isC?'correct':'wrong'}">${isC?'BENAR':'SALAH'}</td></tr>`;
            });
            document.getElementById('test-screen').style.display='none';
            document.getElementById('result-screen').style.display='block';
            document.getElementById('score-val').innerText = Math.round((score/rawData.length)*100);
            document.getElementById('res-name').innerText = document.getElementById('username').value;
            document.getElementById('recap-body').innerHTML = h;
        }
    }
