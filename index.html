<head>

    <style>
        body { background: #1a1a2e; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 15px; text-align: center; width: 90%; max-width: 400px; border-top: 8px solid #c5a059; }
        input { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box; }

        .menu { display: none; text-align: left; }
        .menu a { display: block; padding: 12px; margin: 8px 0; border: 1px solid #eee; text-decoration: none; color: #1a1a2e; font-weight: bold; border-radius: 5px; background: #f9f9f9; }
    </style>
</head>
<body>

<div class="box">
    <div id="login">
        <h2 style="margin:0">LOGIN AKSES</h2>
        <p style="font-size:12px; color:#c5a059">Persona Research & Consulting</p>

<script>
    function masuk() {
        var p = document.getElementById("psw").value;
        if (p === "persona05") {
            document.getElementById("login").style.display = "none";
            document.getElementById("menu").style.display = "block";
        } else {
            alert("Password Salah!");
        }
