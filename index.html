<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal CAT — Persona Research & Consulting</title>
    <style>
        :root { 
            --primary: #1a1a2e; 
            --accent: #c5a059;  
            --bg: #f8f7f2; 
        }

        /* Anti-Copy diaktifkan hanya pada teks umum, bukan kotak input */
        body { 
            background: var(--bg); 
            font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
            -webkit-user-select: none;
            user-select: none;
        }

        .container { 
            max-width: 500px; 
            margin: auto; 
            background: #fff; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            text-align: center;
            border-top: 8px solid var(--accent);
        }

        /* Memastikan kotak input BISA dipilih dan diketik */
        input[type="password"] {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            -webkit-user-select: text !important;
            user-select: text !important;
            cursor: text;
        }

        .btn-lock {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: var(--accent);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .menu-grid { display: grid; gap: 10px; margin-top: 20px; }
        .menu-item {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-decoration: none;
            color: var(--primary);
            font-weight: bold;
            background: #fff;
        }

        #main-menu { display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="container">
    <div id="login-screen">
        <h2>ACCESS CONTROL</h2>
        <p style="color: #c5a059; font-weight: bold;">PERSONA RESEARCH & CONSULTING</p>
        <input type="password" id="passInput" placeholder="Klik di sini & ketik password">
        <button class="btn-lock" onclick="checkAccess()">BUKA MENU</button>
    </div>

    <div id="main-menu">
        <h3>DAFTAR SIMULASI CAT</h3>
        <div class="menu-grid">
            <a href="kecerdasan_kognitif_bumn.html" class="menu-item">Kecerdasan Kognitif BUMN</a>
            <a href="potensi_kognitif_1.html" class="menu-item">Tes Potensi Kognitif 1</a>
            <a href="potensi_kognitif_2.html" class="menu-item">Tes Potensi Kognitif 2</a>
            <a href="potensi_kognitif_100soal.html" class="menu-item">Potensi Kognitif 100 Soal</a>
            <a href="kdkmp_1.html" class="menu-item">KDKMP Modul 1</a>
            <a href="kdkmp_2.html" class="menu-item">KDKMP Modul 2</a>
            <a href="kdmp_50b.html" class="menu-item">Assessment KDKMP 50</a>
        </div>
    </div>
</div>

<script>
    const ACCESS_KEY = "persona05";

    function checkAccess() {
        const input = document.getElementById('passInput').value;
        if (input === ACCESS_KEY) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'block';
        } else {
            alert("Password Salah!");
        }
    }

    // Hanya memblokir tombol F12 dan Ctrl+U agar tidak bisa intip kode
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || (e.ctrlKey && e.keyCode == 85)) {
            return false;
        }
    };
</script>
</body>
</html>
